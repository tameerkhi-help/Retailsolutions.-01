<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Retailsolutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Retail<span>solutions</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="solutions.html">Solutions</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="process.html">Process</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="hamburger">☰</div>
        </div>
    </header>

    <section class="contact-section container scroll-anim">
        <div class="contact-info">
            <h1 style="font-size: 48px; margin-bottom: 20px;">Let's scale your operations.</h1>
            <p style="font-size: 20px; color: #475569; margin-bottom: 40px;">Get in touch with us to schedule your free consultation and tech audit.</p>
            
            <div class="method">
                <strong>Direct Support</strong>
                <p>+1 (800) 123-4567</p>
            </div>
            <div class="method">
                <strong>Email Us</strong>
                <p>contact@retailsolutions.com</p>
            </div>
        </div>
        
        <div class="contact-form">
            <form id="contactForm">
                <div class="input-group">
                    <label>Your Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label>Number of Stores</label>
                    <input type="number" id="stores" placeholder="e.g. 5" required>
                </div>
                <button type="submit" class="btn btn-primary full-width">Send Message</button>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>
    </section>

    <footer>
        <div class="footer-bottom container"><p>&copy; 2026 Retailsolutions.</p></div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
